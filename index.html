<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netic ISP</title>

    <!-- 1. Tell the browser engine we support both modes immediately -->
    <meta name="color-scheme" content="light dark">

    <!-- 2. THE SECRET SAUCE: Inline CSS sets the color before any files load -->
    <style>
        /* Light mode background */
        
        html {
            background-color: #f9fafb;
        }
        /* Dark mode background */
        
        html.dark {
            background-color: #09090b;
        }
        /* Prevent white flash during transition */
        
        body {
            margin: 0;
            min-height: 100vh;
        }
    </style>

    <!-- 3. THE SCRIPT: Adds the .dark class instantly -->
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('theme');
                var system = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && system)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {}
        })();
    </script>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
